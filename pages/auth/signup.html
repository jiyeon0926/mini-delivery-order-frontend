<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <meta name="generator" content="Astro v5.13.2" />
    <title>회원가입</title>
    <link
      rel="canonical"
      href="https://getbootstrap.com/docs/5.3/examples/sign-in/"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="/assets/js/color-modes.js"></script>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/common.css" rel="stylesheet" />
  </head>
  <body class="d-flex align-items-center py-4 bg-body-tertiary">
    <main class="form-signin w-100 m-auto px-3">
      <h1 class="h3 mb-2 fw-bold">회원가입</h1>
      <p class="text-body-secondary mb-4" style="font-size: 0.875rem">
        가입 유형을 선택해주세요.
      </p>
      <div class="d-grid gap-2 mb-4">
        <button class="btn btn-outline-dark py-2 role-btn" id="btn-customer">
          고객으로 가입하기
        </button>
        <button class="btn btn-outline-dark py-2 role-btn" id="btn-owner">
          사장님으로 가입하기
        </button>
      </div>

      <div class="d-none" id="form-customer">
        <hr class="mb-4" />
        <h2 class="h5 fw-bold mb-3">👤 회원가입</h2>
        <form>
          <div class="form-floating">
            <input
              type="email"
              class="form-control"
              id="customer-email"
              placeholder="name@example.com"
            />
            <label for="customer-email">이메일</label>
          </div>
          <div class="form-floating">
            <input
              type="password"
              class="form-control"
              id="customer-password"
              placeholder="Password"
            />
            <label for="customer-password">비밀번호</label>
          </div>
          <div class="form-floating">
            <input
              type="nickname"
              class="form-control"
              id="customer-nickname"
              placeholder="nickname"
            />
            <label for="customer-nickname">닉네임</label>
          </div>
          <button class="btn btn-primary w-100 py-2" type="submit">
            가입하기
          </button>
        </form>
      </div>

      <div class="d-none" id="form-owner">
        <hr class="mb-4" />
        <h2 class="h5 fw-bold mb-3">🧑‍🍳 회원가입</h2>
        <form>
          <div class="form-floating">
            <input
              type="email"
              class="form-control"
              id="owner-email"
              placeholder="name@example.com"
            />
            <label for="owner-email">이메일</label>
          </div>
          <div class="form-floating">
            <input
              type="password"
              class="form-control"
              id="owner-password"
              placeholder="Password"
            />
            <label for="owner-password">비밀번호</label>
          </div>
          <div class="form-floating">
            <input
              type="nickname"
              class="form-control"
              id="owner-nickname"
              placeholder="nickname"
            />
            <label for="owner-nickname">닉네임</label>
          </div>
          <button class="btn btn-primary w-100 py-2" type="submit">
            가입하기
          </button>
        </form>
      </div>
      <p class="mt-4 mb-1 text-body-secondary" style="font-size: 0.8rem">
        이미 계정이 있으신가요?
        <a href="/pages/auth/login.html" class="text-dark fw-bold">로그인</a>
      </p>
      <p class="mt-5 mb-3 text-body-secondary">
        &copy; 2026 Mini Delivery Order by JYHA
      </p>
    </main>
    <script
      src="/assets/js/bootstrap.bundle.min.js"
      class="astro-vvvwv3sm"
    ></script>
    <script src="/assets/js/api.js"></script>
    <script>
      $(".role-btn").on("click", function () {
        const role = $(this).attr("id").replace("btn-", "");

        const isActive = $(this).hasClass("btn-dark");
        if (isActive) {
          $(".role-btn").removeClass("btn-dark").addClass("btn-outline-dark");
          $("#form-customer, #form-owner").addClass("d-none");

          return;
        }

        $(".role-btn").removeClass("btn-dark").addClass("btn-outline-dark");
        $(this).removeClass("btn-outline-dark").addClass("btn-dark");

        $("#form-customer, #form-owner").addClass("d-none");
        $("#form-" + role).removeClass("d-none");
      });

      $("#form-customer form").on("submit", function (e) {
        e.preventDefault();

        const data = {
          email: $("#customer-email").val().trim(),
          password: $("#customer-password").val(),
          nickname: $("#customer-nickname").val().trim(),
        };

        customerSignupAPI(data)
          .done(function () {
            alert("회원가입을 성공하였습니다.");
            window.location.href = "/pages/auth/login.html";
          })
          .fail(function () {
            alert("회원가입을 실패하였습니다.");
          });
      });

      $("#form-owner form").on("submit", function (e) {
        e.preventDefault();

        const data = {
          email: $("#owner-email").val().trim(),
          password: $("#owner-password").val(),
          nickname: $("#owner-nickname").val().trim(),
        };

        ownerSignupAPI(data)
          .done(function () {
            alert("회원가입을 성공하였습니다.");
            window.location.href = "/pages/auth/login.html";
          })
          .fail(function (err) {
            alert("회원가입을 실패하였습니다.");
          });
      });
    </script>
  </body>
</html>
