<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <meta name="generator" content="Astro v5.13.2" />
    <title>로그인</title>
    <link
      rel="canonical"
      href="https://getbootstrap.com/docs/5.3/examples/sign-in/"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="/assets/js/color-modes.js"></script>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/common.css" rel="stylesheet" />
  </head>
  <body class="d-flex align-items-center py-4 bg-body-tertiary">
    <main class="form-auth w-100 m-auto">
      <form>
        <h1 class="h3 mb-3 fw-normal">로그인</h1>
        <div class="form-floating">
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="name@example.com"
          />
          <label for="email">이메일</label>
        </div>
        <div class="form-floating mb-4">
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Password"
          />
          <label for="password">비밀번호</label>
        </div>
        <button class="btn btn-primary w-100 py-2" type="submit">로그인</button>
        <p class="mt-4 mb-1 text-body-secondary" style="font-size: 0.8rem">
          계정이 없으신가요?
          <a href="/pages/auth/signup.html" class="text-dark fw-bold"
            >회원가입</a
          >
        </p>
        <p class="mt-5 mb-3 text-body-secondary">&copy; 2026 Eat Now</p>
      </form>
    </main>
    <script src="/assets/js/api.js"></script>
    <script>
      $("form").on("submit", function (e) {
        e.preventDefault();

        const data = {
          email: $("#email").val().trim(),
          password: $("#password").val(),
        };

        loginAPI(data)
          .done(function (response) {
            alert("로그인을 성공하였습니다.");
            localStorage.setItem("accessToken", response.data.accessToken);

            const role = response.data.role;
            if (role == "CUSTOMER") {
              window.location.href = "index.html";
            } else if (role == "OWNER") {
              window.location.href = "/pages/owner/main.html";
            }
          })
          .fail(function () {
            alert("로그인을 실패하였습니다.");
          });
      });
    </script>
  </body>
</html>
