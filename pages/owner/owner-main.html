<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <script src="/assets/js/color-modes.js"></script>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/common.css" rel="stylesheet" />
    <title>사장 메인</title>

    <style>
        /* 사이드바 */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

        /* 토글 버튼 */
        .btn-toggle {
            display: flex;
            align-items: center;
            width: 100%;
            font-weight: 600;
            color: #333;
            background: none;
            border: none;
            padding: 10px;
        }

        .btn-toggle:hover {
            background: #e9ecef;
        }

        /* 화살표 */
        .btn-toggle::before {
            content: "›";
            margin-right: 10px;
            transition: transform 0.2s;
        }

        .btn-toggle[aria-expanded="true"]::before {
            transform: rotate(90deg);
        }

        /* 내부 메뉴 */
        .btn-toggle-nav a {
            display: block;
            padding: 6px 20px;
            color: #555;
            text-decoration: none;
        }

        .btn-toggle-nav a:hover {
            background: #e9ecef;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/pages/owner/owner-main.html">Eat Now</a>
            <div class="d-flex align-items-center gap-3 ms-auto">
                <!-- 햄버거 -->
                <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="navbarMenu"
                aria-labelledby="navbarMenuLabel">
                <div class="offcanvas-header">
                    <div class="d-flex flex-column">
                        <h5 class="offcanvas-title mb-0" id="nickname"></h5>
                        <div class="small text-white-50" id="email"></div>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                        aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="/pages/user/nickname.html">닉네임 변경</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/pages/user/password.html">비밀번호 변경</a>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="logoutBtn">
                                로그아웃
                            </button>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">내 가게</a>
                        </li>

                        <li class="nav-item">
                            <button class="nav-link btn btn-link text-start text-danger" id="deleteAccountBtn">
                                회원탈퇴
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    <div class="d-flex">
        <!-- 사이드 바 -->
        <div class="sidebar">
            <ul class="list-unstyled store-side">
            </ul>
        </div>
        <main class="flex-grow-1 p-4">
            <div class="container-fluid h-100">
                <div class="row g-4 align-items-stretch">

                    <!-- 왼쪽: 주문 카드(큰 영역) -->
                    <section class="col-12 col-lg-8">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title mb-4 fs-2 fw-bold">오늘의 주문(전체)</h5>

                                <div class="d-flex flex-column gap-4">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div class="d-flex align-items-center gap-4">
                                            <span class="rounded-circle bg-success"
                                                style="width:12px;height:12px;"></span>
                                            <div class="fw-bold fs-4">신규</div>
                                        </div>
                                        <div class="fw-bold fs-2"><span id="pending"></span> <span
                                                class="fs-5 fw-normal">건</span></div>
                                    </div>

                                    <div class="d-flex justify-content-between align-items-center">
                                        <div class="d-flex align-items-center gap-4">
                                            <span class="rounded-circle bg-warning"
                                                style="width:12px;height:12px;"></span>
                                            <div class="fw-bold fs-4">조리 중</div>
                                        </div>
                                        <div class="fw-bold fs-2"><span id="cooking"></span> <span
                                                class="fs-5 fw-normal">건</span></div>
                                    </div>

                                    <div class="d-flex justify-content-between align-items-center">
                                        <div class="d-flex align-items-center gap-4">
                                            <span class="rounded-circle bg-primary"
                                                style="width:12px;height:12px;"></span>
                                            <div class="fw-bold fs-4">배달 중</div>
                                        </div>
                                        <div class="fw-bold fs-2"><span id="delivering"></span> <span
                                                class="fs-5 fw-normal">건</span></div>
                                    </div>

                                    <div class="d-flex justify-content-between align-items-center">
                                        <div class="d-flex align-items-center gap-4">
                                            <span class="rounded-circle bg-secondary"
                                                style="width:12px;height:12px;"></span>
                                            <div class="fw-bold fs-4">배달 완료</div>
                                        </div>
                                        <div class="fw-bold fs-2"><span id="delivered"></span> <span
                                                class="fs-5 fw-normal">건</span></div>
                                    </div>

                                    <div class="d-flex justify-content-between align-items-center">
                                        <div class="d-flex align-items-center gap-4">
                                            <span class="rounded-circle bg-danger"
                                                style="width:12px;height:12px;"></span>
                                            <div class="fw-bold fs-4">주문 거절</div>
                                        </div>
                                        <div class="fw-bold fs-2"><span id="rejected"></span> <span
                                                class="fs-5 fw-normal">건</span></div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </section>

                    <!-- 오른쪽: 가게별 영업 상태(세로로 쌓이는 영역) -->
                    <aside class="col-12 col-lg-4">
                        <div class="d-flex flex-column gap-3" id="storeList">
                            <!-- renderStores()에서 여기 안에 카드 형태로 넣으면 1번째 사진처럼 됨 -->
                        </div>
                    </aside>

                </div>
            </div>
        </main>
    </div>

    <script src="/assets/js/bootstrap.bundle.min.js" class="astro-vvvwv3sm"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/common.js"></script>
    <script>
        function loadProfile() {
            profileAPI().done(function (response) {
                const nickname = response.data.nickname;
                const email = response.data.email;

                $("#nickname").text(nickname);
                $("#email").text(email);
            })
        }

        function loadOrderCount() {
            orderCountAPI().done(function (response) {
                const count = response.data.count;
                const pending = count.pending;
                const cooking = count.cooking;
                const delivering = count.delivering;
                const delivered = count.delivered;
                const rejected = count.rejected;

                $("#pending").text(pending);
                $("#cooking").text(cooking);
                $("#delivering").text(delivering);
                $("#delivered").text(delivered);
                $("#rejected").text(rejected);
            });
        }

        function renderStoreSide(data) {
            const sideHtml = data
                .map(
                    (d) => `
                    <li>
                    <button class="btn-toggle" data-bs-toggle="collapse" data-bs-target="#home" aria-expanded="true">
                        ${d.name}
                    </button>
                    <div class="collapse show" id="home">
                        <ul class="btn-toggle-nav list-unstyled small">
                            <li><a href="/pages/owner/owner-quick.html?storeId=${d.id}">대시보드</a></li>
                            <li><a href="/pages/owner/owner-store-manage.html?storeId=${d.id}">가게 관리</a></li>
                            <li><a href="/pages/owner/owner-order-manage.html?storeId=${d.id}">주문 목록</a></li>
                            <li><a href="/pages/owner/owner-review-manage.html?storeId=${d.id}">리뷰 관리</a></li>
                            <li><a href="/pages/owner/owner-menu-manage.html?storeId=${d.id}">메뉴 관리</a></li>
                        </ul>
                    </div>
                </li>
                `,
                )
                .join("");

            $(".store-side").html(sideHtml);
        }

        function renderStores(data) {
            const storeListHtml = data
                .filter(d => d.deleted === false)
                .map((d) => `
                    <div class="card">
                        <div class="card-body d-flex flex-column gap-4">
                            <div class="fw-bold fs-4">${d.name}</div>
                            <div class="d-flex justify-content-between align-items-center w-100">
                                <div class="text-muted fs-5">영업 상태</div>
                                <div class="form-check form-switch m-0">
                                    <input
                                        class="form-check-input m-0"
                                        style="transform: scale(1.8); transform-origin: right center;"
                                        type="checkbox"
                                        role="switch"
                                        data-store-id="${d.id}"
                                        ${d.storeStatus === "OPEN" ? "checked" : ""}
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                `)
                .join("");

            $("#storeList").html(storeListHtml);
        }

        function loadStores() {
            myStoresAPI().done(function (response) {
                const data = response.data;

                renderStoreSide(data);
                renderStores(data);
            });
        }

        $(document).ready(function () {
            loadProfile();
            loadOrderCount();
            loadStores();
        });

        $("#storeList").on("change", ".form-check-input", function () {
            const storeId = $(this).data("store-id");
            const isChecked = $(this).is(":checked");
            const storeStatus = isChecked ? "OPEN" : "CLOSE";

            updateStoreStatusAPI(storeId, { storeStatus }).fail(function () {
                alert("영업 상태를 변경할 수 없습니다.");
                loadStores();
            });
        });
    </script>
</body>

</html>
