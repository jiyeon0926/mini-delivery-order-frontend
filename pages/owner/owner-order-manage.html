<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <script src="/assets/js/color-modes.js"></script>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/common.css" rel="stylesheet" />
    <title>주문 관리</title>

    <style>
        /* 사이드바 */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

        /* 토글 버튼 */
        .btn-toggle {
            display: flex;
            align-items: center;
            width: 100%;
            font-weight: 600;
            color: #333;
            background: none;
            border: none;
            padding: 10px;
        }

        .btn-toggle:hover {
            background: #e9ecef;
        }

        /* 화살표 */
        .btn-toggle::before {
            content: "›";
            margin-right: 10px;
            transition: transform 0.2s;
        }

        .btn-toggle[aria-expanded="true"]::before {
            transform: rotate(90deg);
        }

        /* 내부 메뉴 */
        .btn-toggle-nav a {
            display: block;
            padding: 6px 20px;
            color: #555;
            text-decoration: none;
        }

        .btn-toggle-nav a:hover {
            background: #e9ecef;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/pages/owner/owner-main.html">Eat Now</a>
            <div class="d-flex align-items-center gap-3 ms-auto">
                <!-- 햄버거 -->
                <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="navbarMenu"
                aria-labelledby="navbarMenuLabel">
                <div class="offcanvas-header">
                    <div class="d-flex flex-column">
                        <h5 class="offcanvas-title mb-0" id="navbarMenuLabel">닉네임</h5>
                        <div class="small text-white-50">user@naver.com</div>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                        aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="/pages/user/nickname.html">닉네임 변경</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/pages/user/password.html">비밀번호 변경</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">내 가게</a>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link btn btn-link text-start text-danger" id="deleteAccountBtn">
                                회원탈퇴
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    <div class="d-flex">
        <!-- 사이드 바 -->
        <div class="sidebar">
            <h5 class="fw-bold mb-3">Collapsible</h5>
            <ul class="list-unstyled store-side">
            </ul>
        </div>
        <main class="flex-grow-1 ps-5 py-5">
            <table>
                <thead>
                    <tr>
                        <th>주문 ID</th>
                        <th>메뉴</th>
                        <th>가격</th>
                        <th>주문 시간</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Table cell</td>
                        <td>Table cell</td>
                        <td>Table cell</td>
                        <td>Table cell</td>
                        <td>Table cell</td>
                    </tr>
                    <tr>
                        <td>Table cell</td>
                        <td>Table cell</td>
                        <td>Table cell</td>
                        <td>Table cell</td>
                        <td>Table cell</td>
                    </tr>
                    <tr>
                        <td>Table cell</td>
                        <td>Table cell</td>
                        <td>Table cell</td>
                        <td>Table cell</td>
                        <td>Table cell</td>
                    </tr>

                </tbody>
            </table>
            <div class="card" style="width: 18rem;">
                <div class="card-body">
                    <h5 class="card-title">주문 취소</h5>
                    <div class="col-8">
                        <select id="order ID" class="form-select ID-select">
                            <option value="ID">주문 ID</option>
                        </select>
                    </div>
                    <h6 class="card-subtitle mb-2 text-body-secondary">주문 취소 하시는 이유를 알려주세요</h6>
                    <input type="text" class="form-control" id="formGroupExampleInput2" placeholder="주문 취소 이유를 작성해주세요.">
                    <button class="btn btn-primary" type="submit">주문 취소</button>
                </div>
            </div>
        </main>

    </div>

    <script src="/assets/js/bootstrap.bundle.min.js" class="astro-vvvwv3sm"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/common.js"></script>
    <script>
        function loadOrderCount() {
            orderCountAPI().done(function (response) {
                const pending = response.data.count.pending;
                const cooking = response.data.count.cooking;
                const delivering = response.data.count.delivering;

                $("#pending").text(pending);
                $("#cooking").text(cooking);
                $("#delivering").text(delivering);
            });
        }

        function renderStoreSide(data) {
            const sideHtml = data
                .map(
                    (d) => `
                    <li>
                    <button class="btn-toggle" data-bs-toggle="collapse" data-bs-target="#home" aria-expanded="true">
                        ${d.name}
                    </button>
                    <div class="collapse show" id="home">
                        <ul class="btn-toggle-nav list-unstyled small">
                            <li><a href="#">대시보드</a></li>
                            <li><a href="#">가게 관리</a></li>
                            <li><a href="#">주문 목록</a></li>
                            <li><a href="#">리뷰 관리</a></li>
                            <li><a href="#">메뉴 관리</a></li>

                        </ul>
                    </div>
                </li>
                `,
                )
                .join("");

            $(".store-side").html(sideHtml);
        }

        function loadStores() {
            myStoresAPI().done(function (response) {
                const data = response.data;

                renderStoreSide(data);
                renderStores(data);
            });
        }

        $(document).ready(function () {
            loadOrderCount();
            loadStores();
        });

    </script>
</body>

</html>
