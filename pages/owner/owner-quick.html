<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <script src="/assets/js/color-modes.js"></script>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/common.css" rel="stylesheet" />
    <title>지점 메인 대시보드</title>

    <style>
        /* 사이드바 */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #ddd;
        }

        /* 토글 버튼 */
        .btn-toggle {
            display: flex;
            align-items: center;
            width: 100%;
            font-weight: 600;
            color: #333;
            background: none;
            border: none;
            padding: 10px;
        }

        .btn-toggle:hover {
            background: #e9ecef;
        }

        /* 화살표 */
        .btn-toggle::before {
            content: "›";
            margin-right: 10px;
            transition: transform 0.2s;
        }

        .btn-toggle[aria-expanded="true"]::before {
            transform: rotate(90deg);
        }

        /* 내부 메뉴 */
        .btn-toggle-nav a {
            display: block;
            padding: 6px 20px;
            color: #555;
            text-decoration: none;
        }

        .btn-toggle-nav a:hover {
            background: #e9ecef;
            border-radius: 5px;
        }

        .quick-menu .quick-col {
            max-width: 320px;
            /* 카드 폭: 원하는 값으로 조절 */
        }

        .quick-menu .quick-card {
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/pages/owner/owner-main.html">Eat Now</a>
            <div class="d-flex align-items-center gap-3 ms-auto">
                <!-- 햄버거 -->
                <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="navbarMenu"
                aria-labelledby="navbarMenuLabel">
                <div class="offcanvas-header">
                    <div class="d-flex flex-column">
                        <h5 class="offcanvas-title mb-0" id="nickname"></h5>
                        <div class="small text-white-50" id="email"></div>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                        aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="/pages/user/nickname.html">닉네임 변경</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/pages/user/password.html">비밀번호 변경</a>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="logoutBtn">
                                로그아웃
                            </button>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">내 가게</a>
                        </li>

                        <li class="nav-item">
                            <button class="nav-link btn btn-link text-start text-danger" id="deleteAccountBtn">
                                회원탈퇴
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    <div class="d-flex">
        <!-- 사이드 바 -->
        <div class="sidebar">
            <ul class="list-unstyled store-side">
            </ul>
        </div>
        <!-- 퀵 메뉴 -->
        <main class="flex-grow-1 ps-5 py-5">
            <div class="quick-menu row row-cols-1 row-cols-lg-3 g-3 justify-content-center">
                <div class="col quick-col">
                    <div class="card quick-card h-100">
                        <div class="card-body d-flex flex-column gap-2">
                            <h5 class="card-title mb-0">가게 관리</h5>
                            <div class="text-muted small">Quick Menu</div>
                            <button class="btn btn-primary btn-sm w-auto align-self-start px-3 mt-auto"
                                id="storeKillBtn">가게 폐업</button>
                        </div>
                    </div>
                </div>

                <div class="col quick-col">
                    <div class="card quick-card h-100">
                        <div class="card-body d-flex flex-column gap-2">
                            <h5 class="card-title mb-0">주문 관리</h5>
                            <div class="text-muted small">Quick Menu</div>
                            <a href="#" class="btn btn-primary btn-sm w-auto align-self-start px-3 mt-auto">주문 취소 요청</a>
                        </div>
                    </div>
                </div>

                <div class="col quick-col">
                    <div class="card quick-card h-100">
                        <div class="card-body d-flex flex-column gap-2">
                            <h5 class="card-title mb-0">리뷰 관리</h5>
                            <div class="text-muted small">Quick Menu</div>
                            <a href="#" class="btn btn-primary btn-sm w-auto align-self-start px-3 mt-auto"
                                id="reviewLink">리뷰 관리</a>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 메뉴 리스트 -->
            <div class="list-group mx-auto py-5" id="menuList" style="max-width: 750px">
            </div>
        </main>
    </div>


    <script src="/assets/js/bootstrap.bundle.min.js" class="astro-vvvwv3sm"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/common.js"></script>
    <script>
        function loadProfile() {
            profileAPI().done(function (response) {
                const nickname = response.data.nickname;
                const email = response.data.email;

                $("#nickname").text(nickname);
                $("#email").text(email);
            })
        }

        function renderStoreSide(data) {
            const sideHtml = data
                .map(
                    (d) => `
                    <li>
                    <button class="btn-toggle" data-bs-toggle="collapse" data-bs-target="#home" aria-expanded="true">
                        ${d.name}
                    </button>
                    <div class="collapse show" id="home">
                        <ul class="btn-toggle-nav list-unstyled small">
                            <li><a href="/pages/owner/owner-quick.html?storeId=${d.id}">대시보드</a></li>
                            <li><a href="/pages/owner/owner-store-manage.html?storeId=${d.id}">가게 관리</a></li>
                            <li><a href="/pages/owner/owner-order-manage.html?storeId=${d.id}">주문 목록</a></li>
                            <li><a href="/pages/owner/owner-review-manage.html?storeId=${d.id}">리뷰 관리</a></li>
                            <li><a href="/pages/owner/owner-menu-manage.html?storeId=${d.id}">메뉴 관리</a></li>
                        </ul>
                    </div>
                </li>
                `,
                )
                .join("");

            $(".store-side").html(sideHtml);
        }

        function loadStores() {
            myStoresAPI().done(function (response) {
                const data = response.data;
                renderStoreSide(data);
            });
        }

        function renderMenus(menus) {
            const menuListHtml = menus
                .map(
                    (m) =>
                        `
                <div class="list-group-item d-flex align-items-center gap-3 py-3">
                    <div class="flex-grow-1">
                      <p class="mb-1 fw-bold">${m.menuName}</p>
                      <p class="mb-1 text-muted small">${m.price.toLocaleString()}원</p>
                    </div>
                </div>
            `,
                )
                .join("");

            $("#menuList").html(menuListHtml);
        }

        function loadMenus() {
            const params = new URLSearchParams(window.location.search);
            const storeId = params.get("storeId");

            storeDetailAPI(storeId)
                .done(function (response) {
                    renderMenus(response.data.menus);
                })
                .fail(function () {
                    $("#menuList").html(
                        "<p class='text-center'>메뉴 정보가 없습니다.</p>",
                    );
                });
        }

        $(document).ready(function () {
            loadProfile();
            loadStores();
            loadMenus();
        });

        $("#storeKillBtn").on("click", function () {
            const isOk = confirm("정말로 폐업 하시겠습니까?");
            if (!isOk) {
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const storeId = params.get("storeId");

            storeKillAPI(storeId)
                .done(function () {
                    alert("폐업되었습니다.");
                    window.location.href = "/pages/owner/owner-main.html";
                })
                .fail(function (xhr) {
                    const msg =
                        xhr?.responseJSON?.message
                    alert(msg);
                });
        });

        $("#reviewLink").on("click", function () {
            const params = new URLSearchParams(window.location.search);
            const storeId = params.get("storeId");

            $("#reviewLink").attr(
                "href",
                `/pages/owner/owner-review-manage.html?storeId=${storeId}`,
            );
        })
    </script>
</body>

</html>
