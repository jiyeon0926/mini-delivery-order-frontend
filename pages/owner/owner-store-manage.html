<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>부평점 가게 관리</title>
    <link rel="stylesheet" href="../../assets/css/owner.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">Eat-Now</div>
        <nav class="side owner-manage-side">
          <a class="side-item active" href="#">가게 관리</a>
          <a class="side-item" href="#">주문 목록</a>
          <a class="side-item" href="#">리뷰 관리</a>
          <a class="side-item" href="#">메뉴 관리</a>
        </nav>
      </aside>

      <section class="main">
        <header class="topbar">
          <a class="topbar-back-link" href="/pages/owner/owner-hongdae.html">부평점 가게 관리</a>
          <div class="topbar-title">안녕하세요, Eat-Now 부평점 사장님!</div>

          <div class="topbar-actions">
            <button class="icon-btn" type="button" aria-label="메뉴">
              <span class="icon">≡</span>
            </button>
          </div>
        </header>

        <main class="content">
          <div class="owner-manage-grid">
            <section class="card owner-form-card">
              <h2 class="card-title owner-form-title">가게 상세 정보 수정</h2>

              <div class="owner-form-rows">
                <div class="owner-form-row">
                  <div class="owner-form-label">가게명</div>
                  <div class="owner-form-value">디저트 중독 부평점</div>
                </div>

                <div class="owner-form-row">
                  <div class="owner-form-label">가게주소</div>
                  <div class="owner-form-value">인천시 부평구 부개동</div>
                </div>

                <div class="owner-form-row">
                  <div class="owner-form-label">최소주문금액</div>
                  <div class="owner-form-value">10,000 원</div>
                </div>

                <div class="owner-form-row">
                  <label class="owner-form-label" for="openTime">여는 시간</label>
                  <select class="owner-time-select" id="openTime">
                    <option>09:00:00</option>
                    <option>10:00:00</option>
                    <option>11:00:00</option>
                  </select>
                </div>

                <div class="owner-form-row">
                  <label class="owner-form-label" for="closeTime">닫는 시간</label>
                  <select class="owner-time-select" id="closeTime">
                    <option>22:00:00</option>
                    <option selected>23:00:00</option>
                    <option>24:00:00</option>
                  </select>
                </div>
              </div>
            </section>

            <section class="owner-status-wrap">
              <div class="owner-action-row">
                <button class="owner-action-btn">가게 폐업</button>
                <button class="owner-action-btn">저장</button>
              </div>

              <div class="card owner-status-card">
                <h2 class="card-title owner-status-title">가게 상태 변경</h2>
                <div class="owner-status-store">부평점</div>

                <div class="owner-status-row">
                  <div class="owner-status-label">영업 상태</div>
                  <label class="switch" aria-label="부평점 영업 상태">
                    <input type="checkbox" checked />
                  </label>
                </div>
              </div>
            </section>
          </div>
        </main>
      </section>
    </div>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/common.js"></script>
  </body>
</html>
