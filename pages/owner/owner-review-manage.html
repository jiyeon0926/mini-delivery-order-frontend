<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <script src="/assets/js/color-modes.js"></script>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/common.css" rel="stylesheet" />
    <title>리뷰 관리</title>

    <style>
      /* 사이드바 */
      .sidebar {
        width: 280px;
        height: 100vh;
        background: #f8f9fa;
        padding: 20px;
        border-right: 1px solid #ddd;
      }

      /* 토글 버튼 */
      .btn-toggle {
        display: flex;
        align-items: center;
        width: 100%;
        font-weight: 600;
        color: #333;
        background: none;
        border: none;
        padding: 10px;
      }

      .btn-toggle:hover {
        background: #e9ecef;
      }

      /* 화살표 */
      .btn-toggle::before {
        content: "›";
        margin-right: 10px;
        transition: transform 0.2s;
      }

      .btn-toggle[aria-expanded="true"]::before {
        transform: rotate(90deg);
      }

      /* 내부 메뉴 */
      .btn-toggle-nav a {
        display: block;
        padding: 6px 20px;
        color: #555;
        text-decoration: none;
      }

      .btn-toggle-nav a:hover {
        background: #e9ecef;
        border-radius: 5px;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/pages/owner/owner-main.html">Eat Now</a>
        <div class="d-flex align-items-center gap-3 ms-auto">
          <!-- 햄버거 -->
          <button
            class="navbar-toggler ms-auto"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#navbarMenu"
            aria-controls="navbarMenu"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
        <div
          class="offcanvas offcanvas-end text-bg-dark"
          tabindex="-1"
          id="navbarMenu"
          aria-labelledby="navbarMenuLabel"
        >
          <div class="offcanvas-header">
            <div class="d-flex flex-column">
              <h5 class="offcanvas-title mb-0" id="nickname"></h5>
              <div class="small text-white-50" id="email"></div>
            </div>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="offcanvas"
              aria-label="Close"
            ></button>
          </div>
          <div class="offcanvas-body">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link" href="/pages/user/nickname.html"
                  >닉네임 변경</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/pages/user/password.html"
                  >비밀번호 변경</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">내 가게</a>
              </li>
              <li class="nav-item">
                <button class="nav-link" id="logoutBtn">로그아웃</button>
              </li>
              <li class="nav-item">
                <button
                  class="nav-link btn btn-link text-start text-danger"
                  id="deleteAccountBtn"
                >
                  회원탈퇴
                </button>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </nav>
    <div class="d-flex">
      <!-- 사이드 바 -->
      <div class="sidebar">
        <ul class="list-unstyled store-side"></ul>
      </div>
      <main class="flex-grow-1 ps-5 py-5">
        <div class="d-flex">
          <div class="card-body">
            <h5 class="card-title mb-4">
              총 리뷰 수 : <span id="total"></span>건
            </h5>
            <div class="w-100 reviews"></div>
          </div>
        </div>
      </main>
    </div>

    <script
      src="/assets/js/bootstrap.bundle.min.js"
      class="astro-vvvwv3sm"
    ></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/common.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const storeId = params.get("storeId");

      function loadProfile() {
        profileAPI().done(function (response) {
          const nickname = response.data.nickname;
          const email = response.data.email;

          $("#nickname").text(nickname);
          $("#email").text(email);
        });
      }

      function renderStoreSide(data) {
        const sideHtml = data
          .map(
            (d) => `
                    <li>
                    <button class="btn-toggle" data-bs-toggle="collapse" data-bs-target="#home" aria-expanded="true">
                        ${d.name}
                    </button>
                    <div class="collapse show" id="home">
                        <ul class="btn-toggle-nav list-unstyled small">
                            <li><a href="/pages/owner/owner-quick.html?storeId=${d.id}">대시보드</a></li>
                            <li><a href="/pages/owner/owner-store-manage.html?storeId=${d.id}">가게 관리</a></li>
                            <li><a href="/pages/owner/owner-order-manage.html?storeId=${d.id}">주문 목록</a></li>
                            <li><a href="/pages/owner/owner-review-manage.html?storeId=${d.id}">리뷰 관리</a></li>
                            <li><a href="/pages/owner/owner-menu-manage.html?storeId=${d.id}">메뉴 관리</a></li>
                        </ul>
                    </div>
                </li>
                `,
          )
          .join("");

        $(".store-side").html(sideHtml);
      }

      function loadStores() {
        myStoresAPI().done(function (response) {
          const data = response.data;
          renderStoreSide(data);
        });
      }

      function renderReviews(data) {
        const total = data.total;
        $("#total").text(total.toLocaleString("ko-KR"));

        const reviewHtml = data.reviews
          .filter((r) => r.deleted === false)
          .map((r) => {
            const stars = "★".repeat(r.rating);

            return `
                    <div class="card w-75 mb-3">
                        <div class="card-body">
                            <h5 class="card-title">${r.nickname}</h5>
                            <h5 class="card-title">${formatDateTime(r.createdAt)}</h5>
                            <p class="small text-warning mb-3">${stars}</p>
                            <p class="card-text">${r.content}
                            </p>
                            <button class="btn btn-primary" id=deleteBtn data-review-id=${r.reviewId}>리뷰 삭제</button>
                        </div>
                    </div>
                `;
          })
          .join("");

        $(".reviews").html(reviewHtml);
      }

      function loadReviews() {
        storeReviewsAPI(storeId).done(function (response) {
          renderReviews(response.data);
        });
      }

      $(document).ready(function () {
        loadProfile();
        loadStores();
        loadReviews();
      });

      $(".reviews").on("click", "#deleteBtn", function () {
        const reviewId = $(this).data("review-id");
        deleteReviewAPI(storeId, reviewId)
          .done(function () {
            alert("리뷰를 삭제하였습니다.");
            loadReviews();
          })
          .fail(function () {
            alert("리뷰를 삭제할 수 없습니다.");
          });
      });
    </script>
  </body>
</html>
