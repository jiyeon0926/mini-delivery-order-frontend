<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="" />
    <meta name="generator" content="Astro v5.13.2" />
    <title>대시보드</title>
    <link
      rel="canonical"
      href="https://getbootstrap.com/docs/5.3/examples/navbars/"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <script src="/assets/js/color-modes.js"></script>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/common.css" rel="stylesheet" />
  </head>
  <body class="d-flex">
    <!-- 사이드바 -->
    <div
      class="d-flex flex-column flex-shrink-0 p-3 text-bg-dark vh-100"
      style="width: 280px"
    >
      <a
        href="/pages/sample/owner-main.html"
        class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none"
      >
        <span class="fs-4">Eat Now</span>
      </a>
      <hr />
      <ul class="nav nav-pills flex-column mb-auto"></ul>
    </div>
    <main class="flex-grow-1">
      <div class="container px-5 py-5">
        <!-- 주문 수 -->
        <div class="row gx-5 mx-auto mb-4" style="max-width: 800px">
          <div class="col-3">
            <div class="card text-center p-3 border-dark">
              <p class="fw-semibold">신규 주문</p>
              <p class="mt-2">
                <span class="fw-bold" id="pending"></span>
                <span>건</span>
              </p>
            </div>
          </div>
          <div class="col-3">
            <div class="card text-center p-3 border-dark">
              <p class="fw-semibold">조리 중</p>
              <p class="mt-2">
                <span class="fw-bold" id="cooking"></span>
                <span>건</span>
              </p>
            </div>
          </div>
          <div class="col-3">
            <div class="card text-center p-3 border-dark">
              <p class="fw-semibold">배달 중</p>
              <p class="mt-2">
                <span class="fw-bold" id="delivering"></span>
                <span>건</span>
              </p>
            </div>
          </div>
          <div class="col-3">
            <div class="card text-center p-3 border-dark">
              <p class="fw-semibold">배달 완료</p>
              <p class="mt-2">
                <span class="fw-bold" id="delivered"></span>
                <span>건</span>
              </p>
            </div>
          </div>
          <!-- 가게별 영업 상태 -->
          <div class="py-5" style="max-width: 600px">
            <p class="mb-2 fw-bold ps-1">가게별 영업 상태</p>
            <div class="list-group mb-2" id="storeList"></div>
          </div>
        </div>
      </div>
    </main>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/common.js"></script>
    <script>
      function renderStoreNav(data) {
        const navHtml = data
          .map(
            (s) => `
                    <li>
                        <a href="/pages/sample/store.html?storeId=${s.id}" class="nav-link text-white">
                            ${s.name}
                        </a>
                    </li>
                `,
          )
          .join("");

        $(".nav-pills").html(navHtml);
      }

      function loadOrderCount() {
        orderCountAPI().done(function (response) {
          const pending = response.data.count.pending;
          const cooking = response.data.count.cooking;
          const delivering = response.data.count.delivering;
          const delivered = response.data.count.delivered;

          $("#pending").text(pending);
          $("#cooking").text(cooking);
          $("#delivering").text(delivering);
          $("#delivered").text(delivered);
        });
      }

      function renderStores(data) {
        const storeListHtml = data
          .map(
            (s) => `
                <div class="list-group-item d-flex gap-3 py-3">
                    <div class="d-flex w-100 justify-content-between ps-2 pe-2">
                        <div class="d-flex flex-column">
                        <p class="mb-1">${s.name}</p>
                        </div>
                        <div class="form-check form-switch">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            role="switch"
                            data-store-id="${s.id}"
                            ${s.storeStatus === "OPEN" ? "checked" : ""}
                        />
                        </div>
                    </div>
                </div>
            `,
          )
          .join("");

        $("#storeList").html(storeListHtml);
      }

      function loadStores() {
        myStoresAPI().done(function (response) {
          const data = response.data;

          renderStoreNav(data);
          renderStores(data);
        });
      }

      $(document).ready(function () {
        loadOrderCount();
        loadStores();
      });

      $("#storeList").on("change", ".form-check-input", function () {
        const storeId = $(this).data("store-id");
        const isChecked = $(this).is(":checked");
        const storeStatus = isChecked ? "OPEN" : "CLOSE";

        updateStoreStatusAPI(storeId, { storeStatus }).fail(function () {
          alert("영업 상태를 변경할 수 없습니다.");
          loadStores();
        });
      });
    </script>
  </body>
</html>
