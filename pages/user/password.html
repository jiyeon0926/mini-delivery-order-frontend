<html lang="en" data-bs-theme="auto">

    <title>비밀번호 변경</title>
    <link
      rel="canonical"
      href="https://getbootstrap.com/docs/5.3/examples/navbars/"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <script src="/assets/js/color-modes.js"></script>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/common.css" rel="stylesheet" />
  </head>
  <body class="bg-body-tertiary">
    <nav class="navbar navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#" id="mainLink">Eat Now</a>
      </div>
    </nav>
    <div class="container">
      <main>
        <div class="py-5 text-center">
          <h1 class="h2 mb-4">비밀번호 변경</h1>
          <p class="text-muted small list-unstyled mb-4">
            최소 8글자 이상, 대소문자 포함 영문 + 숫자 + 특수문자를 1글자씩
            포함해야 합니다.
          </p>
        </div>
        <div class="col-md-6 col-lg-5 mx-auto">
          <form class="needs-validation">
            <div class="nickname mb-3">
              <label for="oldPassword" class="form-label">비밀번호</label>
              <input type="password" class="form-control" id="oldPassword" />
            </div>
            <div class="mb-4">
              <label for="newPassword" class="form-label">새 비밀번호</label>
              <input type="password" class="form-control" id="newPassword" />
            </div>
            <div class="d-flex gap-2">
              <button
                class="w-50 btn btn-outline-secondary btn-lg"
                type="button"
                id="cancelBtn"
              >
                취소
              </button>
              <button class="w-50 btn btn-primary btn-lg" type="submit">
                완료
              </button>
            </div>
          </form>
        </div>
      </main>
      <footer class="pt-5 pb-4 text-body-secondary text-center text-small">
        <p class="mb-1">&copy; 2026 Eat Now</p>
      </footer>
    </div>
    <script
      src="/assets/js/bootstrap.bundle.min.js"
      class="astro-vvvwv3sm"
    ></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/common.js"></script>
    <script>
      let role = null;

      function redirectByRole() {
        window.location.href =
          role === "CUSTOMER" ? "/index.html" : "/pages/owner/owner-main.html";
      }

      $(document).ready(function () {
        updateCustomerAuthUI();

        profileAPI().done(function (response) {
          role = response.data.role;
        });

        $("form").on("submit", function (e) {
          e.preventDefault();

          const data = {
            oldPassword: $("#oldPassword").val(),
            newPassword: $("#newPassword").val(),
          };

          passwordAPI(data)
            .done(redirectByRole)
            .fail(function () {
              alert("비밀번호 변경을 실패하였습니다.");
            });
        });

        $("#cancelBtn").on("click", redirectByRole);
        $("#mainLink").on("click", redirectByRole);
      });
    </script>
  </body>
</html>
