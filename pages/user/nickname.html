<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>닉네임 변경</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/common.css" rel="stylesheet" />
    <style>
      .nickname {
        pointer-events: none;
      }
    </style>
  </head>
  <body class="bg-body-tertiary">
    <nav class="navbar navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#" id="mainLink">Eat Now</a>
      </div>
    </nav>
    <div class="container">
      <main>
        <div class="py-5 text-center">
          <h1 class="h2 mb-4">닉네임 변경</h1>
          <p class="mb-2">새로운 닉네임을 입력해주세요.</p>
          <ul class="text-muted small list-unstyled mb-4">
            <li>2자 ~ 10자</li>
            <li>한글, 영문, 숫자만 가능</li>
          </ul>
        </div>
        <div class="col-md-6 col-lg-5 mx-auto">
          <form class="needs-validation">
            <div class="nickname mb-3">
              <label for="nickname" class="form-label">닉네임</label>
              <input
                type="text"
                class="form-control"
                id="nickname"
                placeholder="기존 닉네임"
                readonly
              />
            </div>
            <div class="mb-4">
              <label for="newNickname" class="form-label">새 닉네임</label>
              <input type="text" class="form-control" id="newNickname" />
            </div>
            <div class="d-flex gap-2">
              <button
                class="w-50 btn btn-outline-secondary btn-lg"
                type="button"
                id="cancelBtn"
              >
                취소
              </button>
              <button class="w-50 btn btn-primary btn-lg" type="submit">
                완료
              </button>
            </div>
          </form>
        </div>
      </main>
      <footer class="pt-5 pb-4 text-body-secondary text-center text-small">
        <p class="mb-1">&copy; 2026 Eat Now</p>
      </footer>
    </div>
    <script
      src="/assets/js/bootstrap.bundle.min.js"
      class="astro-vvvwv3sm"
    ></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/common.js"></script>
    <script>
      let role = null;

      function redirectByRole() {
        window.location.href =
          role === "CUSTOMER" ? "/index.html" : "/pages/owner/owner-main.html";
      }

      $(document).ready(function () {
        updateCustomerAuthUI();

        profileAPI().done(function (response) {
          const nickname = response.data.nickname;
          role = response.data.role;

          $("#nickname").val(nickname);
        });

        $("form").on("submit", function (e) {
          e.preventDefault();

          const data = {
            nickname: $("#newNickname").val().trim(),
          };

          nicknameAPI(data)
            .done(redirectByRole)
            .fail(function () {
              alert("닉네임 변경을 실패하였습니다.");
            });
        });

        $("#cancelBtn").on("click", redirectByRole);
        $("#mainLink").on("click", redirectByRole);
      });
    </script>
  </body>
</html>
