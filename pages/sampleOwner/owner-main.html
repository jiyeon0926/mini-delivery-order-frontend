<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>사장 대시보드</title>
    <link rel="stylesheet" href="../../assets/css/owner.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  </head>

  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="brand">Eat-Now</div>

        <nav class="side">
          <a
            class="side-item side-dashboard-item"
            href="/pages/owner/owner-main.html"
            aria-label="사장 대시보드"
          >
            대시보드
          </a>
          <div class="side-section">

          <div class="side-section">
            <div class="store-list" id="storeList"></div>
          </div>
        </nav>
      </aside>

      <!-- Main -->
      <section class="main">
        <header class="topbar">
          <div class="topbar-title">사장 대시보드</div>

          <div class="topbar-actions">
            <button class="icon-btn" type="button" aria-label="메뉴" id="drawerOpenBtn">
              <span class="icon">≡</span>
            </button>
          </div>
        </header>

        <main class="content">
          <div class="grid">
            <!-- Orders -->
            <section class="card orders">
              <h2 class="card-title">오늘의 주문 (전체)</h2>

              <div class="orders-rows">
                <div class="orders-row pending">
                  <div class="left">
                    <span class="dot" aria-hidden="true"></span>
                    <span class="label">신규</span>
                  </div>
                  <div class="right">
                    <strong id="countPending">0</strong>
                    <span class="unit">건</span>
                  </div>
                </div>

                <div class="row-divider" aria-hidden="true"></div>

                <div class="orders-row cooking">
                  <div class="left">
                    <span class="dot" aria-hidden="true"></span>
                    <span class="label">조리 중</span>
                  </div>
                  <div class="right">
                    <strong id="countCooking">0</strong>
                    <span class="unit">건</span>
                  </div>
                </div>

                <div class="row-divider" aria-hidden="true"></div>

                <div class="orders-row delivering">
                  <div class="left">
                    <span class="dot" aria-hidden="true"></span>
                    <span class="label">배달 중</span>
                  </div>
                  <div class="right">
                    <strong id="countDelivering">0</strong>
                    <span class="unit">건</span>
                  </div>
                </div>
              </div>
            </section>

            <!-- Status -->
            <section class="status-col">
              <div class="status-card" id="statusList"></div>
            </section>
          </div>
        </main>
      </section>
    </div>

<!-- Drawer Backdrop -->
<div class="drawer-backdrop" id="drawerBackdrop" hidden></div>

<!-- Drawer -->
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-header">
    <div class="drawer-user">
      <div class="drawer-avatar" aria-hidden="true"></div>
      <div class="drawer-userinfo">
        <div class="drawer-nickname" id="drawerNickname">닉네임</div>
        <div class="drawer-email" id="drawerEmail">user@naver.com</div>
      </div>
    </div>

    <button class="drawer-close" type="button" aria-label="닫기" id="drawerCloseBtn">
      ✕
    </button>
  </div>

  <nav class="drawer-menu">
    <a class="drawer-item" href="/pages/user/password.html">비밀번호 변경</a>
    <button class="drawer-item danger" type="button" id="logoutBtn">로그아웃</button>
    <a class="drawer-item" href="/pages/owner/owner-stores.html">내 가게</a>
  </nav>
  <button class="drawer-withdraw" type="button" id="deleteAccountBtn">회원탈퇴</button></aside>

    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/common.js"></script>
    <script src="../../assets/js/owner-main.js"></script>
  </body>
  
</html>
