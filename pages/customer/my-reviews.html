    <script>
      function renderReviews(data) {
        const myReviewListHtml = data
          .map((r) => {
            const stars = "★".repeat(r.rating);

            return `
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="d-flex w-100 justify-content-between py-2">
                            <div class="d-flex flex-column">
                                <a
                                    href="/pages/customer/store-detail.html?storeId=${r.storeId}"
                                    class="text-decoration-none text-dark"
                                    ><p class="mb-1 fw-bold">${r.storeName}</p></a
                                >
                                <p class="small text-warning mb-3">${stars}</p>
                                <p class="mb-1 fw-bold content">${r.content}</p>
                            </div>
                            <div class="text-end small fw-semibold">${formatDateTime(r.createdAt)}</div>
                        </div>
                    </div>
                </div>
            `;
          })
          .join("");

        $("#myReviewList").html(myReviewListHtml);
      }

      function loadReviews() {
        myReviewsAPI()
          .done(function (response) {
            renderReviews(response.data);
          })
          .fail(function () {
            $("#myReviewList").html(
              "<p class='text-center'>작성한 리뷰가 없습니다.</p>",
            );
          });
      }

      $(document).ready(function () {
        updateCustomerAuthUI();
        loadReviews();
      });
    </script>
