    <script>
      function renderCart(data) {
        if (data.items.length === 0) {
          $(".cart").html(
            "<p class='text-center'>장바구니가 비어 있어요. 메뉴를 담아보세요!</p>",
          );

          return;
        }

        const storeName = data.storeName;
        const totalAmount = data.totalAmount;

        $("#storeName").text(storeName);
        $("#totalAmount").text(`${totalAmount.toLocaleString()}원`);

        const itemListHtml = data.items
          .map(
            (i) => `
              <div class="list-group-item d-flex py-3 align-items-center" data-item-id="${i.itemId}">
                <div class="d-flex w-100 justify-content-between ps-2 pe-2">
                  <div class="d-flex flex-column">
                    <div class="mb-2">
                      <span class="mb-1">${i.menuName}</span>
                      <span class="text-muted small ps-2"
                        >${i.price.toLocaleString()}원</span
                      >
                    </div>
                    <span class="fw-semibold"
                      >${i.totalPrice.toLocaleString()}원</span
                    >
                  </div>
                </div>
                <div class="input-group mx-auto" style="max-width: 120px">
                  <button class="btn btn-outline-secondary btn-minus" type="button">
                    −
                  </button>
                  <span
                    class="input-group-text bg-white text-center quantity"
                    style="width: 40px"
                    >${i.quantity}</span
                  >
                  <button class="btn btn-outline-secondary btn-plus" type="button">
                    +
                  </button>
                </div>
              </div>
            `,
          )
          .join("");

        $("#itemList").html(itemListHtml);

        const storeId = data.storeId;
        $("#storeLink").attr(
          "href",
          `/pages/customer/store-detail.html?storeId=${storeId}`,
        );
      }

      function loadCart() {
        cartAPI().done(function (response) {
          renderCart(response.data);
        });
      }

      $(document).ready(function () {
        updateCustomerAuthUI();
        loadCart();
      });

      $("#itemList").on("click", ".btn-minus, .btn-plus", function () {
        // closest: 위쪽 방향으로 올라가면서 조건에 맞는 요소 반환 ↔ find: 아래 방향
        const item = $(this).closest(".list-group-item");
        const itemId = item.data("item-id");
        const isMinus = $(this).hasClass("btn-minus");
        const currentQuantity = parseInt(item.find(".quantity").text());

        if (isMinus && currentQuantity === 1) {
          deleteCartItemAPI(itemId).done(function () {
            loadCart();
          });

          return;
        }

        const data = {
          quantity: isMinus ? currentQuantity - 1 : currentQuantity + 1,
        };

        updateItemQuantityAPI(itemId, data).done(function (response) {
          renderCart(response.data);
        });
      });

      $("#address").on("input", function () {
        $("#charCount").text($(this).val().length);
      });

      $("#orderBtn").on("click", function () {
        const address = $("#address").val().trim();
        if (!address) {
          alert("주소를 입력해주세요.");
          $("#address").focus();

          return;
        }

        const data = {
          address: address,
        };

        orderAPI(data)
          .done(function () {
            window.location.href = "/pages/customer/order-list.html";
          })
          .fail(function (xhr) {
            alert(xhr.responseJSON?.message);
          });
      });
    </script>
