    <script>
      function renderMenus(menus) {
        const token = localStorage.getItem("accessToken");
        const menuListHtml = menus
          .map(
            (m) =>
              `
                <div class="list-group-item d-flex align-items-center gap-3 py-3">
                    <i class="bi bi-menu-button-wide fs-5 ps-2"></i>
                    <div class="flex-grow-1">
                      <p class="mb-1 fw-bold">${m.menuName}</p>
                      <p class="mb-1 text-muted small">${m.price.toLocaleString()}원</p>
                    </div>
                    <div class="d-flex align-items-center gap-2 ${token ? "" : "d-none"}">
                      <div class="d-flex align-items-center border rounded">
                        <button class="btn btn-outline-secondary border-0 btn-minus" type="button" style="width: 32px">−</button>
                        <span class="quantity text-center" style="width: 32px">1</span>
                        <button class="btn btn-outline-secondary border-0 btn-plus" type="button" style="width: 32px">+</button>
                      </div>
                      <div class="ps-4 pe-2">
                        <button
                          class="btn btn-primary add-cart-item"
                          data-menu-id="${m.menuId}"
                          >담기
                        </button>
                      </div>
                    </div>
                </div>
            `,
          )
          .join("");

        $("#menuList").html(menuListHtml);
      }

      function loadStoreDetail() {
        const params = new URLSearchParams(window.location.search);
        const storeId = params.get("storeId");

        storeDetailAPI(storeId)
          .done(function (response) {
            const storeName = response.data.storeName;
            const averageRating = response.data.averageRating;
            const reviewCount = response.data.reviewCount;
            const minOrderAmount = response.data.minOrderAmount;
            const address = response.data.address;
            const openTime = response.data.openTime;
            const closeTime = response.data.closeTime;
            const storeStatus = response.data.storeStatus;

            $("#storeName").text(storeName);
            $("#averageRating").text(`★ ${averageRating}`);
            $("#reviewCount").text(`(${reviewCount})`);
            $("#minOrderAmount").text(minOrderAmount.toLocaleString());
            $("#address").text(address);
            $("#openTime").text(formatTime(openTime));
            $("#closeTime").text(formatTime(closeTime));

            const statusText = storeStatus === "OPEN" ? "영업 중" : "영업 종료";
            const statusClass =
              storeStatus === "OPEN" ? "text-success" : "text-danger";
            $("#storeStatus").text(statusText).addClass(statusClass);

            $("#reviewLink").attr(
              "href",
              `/pages/customer/store-reviews.html?storeId=${storeId}`,
            );

            renderMenus(response.data.menus);
          })
          .fail(function () {
            $("#storeDetail").html(
              "<p class='text-center'>가게 정보가 없습니다.</p>",
            );
          });
      }

      $(document).ready(function () {
        updateCustomerAuthUI();
        loadStoreDetail();
      });

      // siblings: 같은 부모를 가진 형제 요소를 찾음 → .btn-plus와 형제 요소인 .quantity를 반환
      $("#menuList").on("click", ".btn-plus", function () {
        const quantity = $(this).siblings(".quantity");

        let value = parseInt(quantity.text());
        quantity.text(value + 1);
      });

      $("#menuList").on("click", ".btn-minus", function () {
        const quantity = $(this).siblings(".quantity");

        let value = parseInt(quantity.text());
        if (value > 1) {
          quantity.text(value - 1);
        }
      });

      $("#menuList").on("click", ".add-cart-item", function () {
        const menuId = $(this).data("menu-id");
        const item = $(this).closest(".list-group-item");
        const quantity = parseInt(item.find(".quantity").text());

        const data = {
          menuId: menuId,
          quantity: quantity,
        };

        addCartItemAPI(data)
          .done(function () {
            alert("장바구니에 담았습니다.");
          })
          .fail(function (xhr) {
            if (xhr.status === 400) {
              alert("현재 영업 중이 아닙니다.");
            }
          });
      });
    </script>
