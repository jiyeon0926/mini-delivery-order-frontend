    <script>
      function renderOrders(data) {
        if (data.length === 0) {
          $("#orderList").html(
            "<p class='text-center'>주문 내역이 없습니다. 지금 주문해보세요!</p>",
          );

          return;
        }

        const orderListHtml = data
          .map((o) => {
            return `
            <div class="card mb-4 ps-3 pe-3">
              <div class="card-body">
                <div class="d-flex w-100 justify-content-between py-2">
                  <div class="d-flex flex-column">
                    <a
                      href="/pages/customer/store-detail.html?storeId=${o.storeId}"
                      class="text-decoration-none text-dark"
                      ><p class="mb-2 fw-bold">${o.storeName}</p></a
                    >
                    <p class="small mb-4">
                      ${formatDate(o.createdAt)}
                      ${o.orderStatus === "REJECTED" ? `<span class="text-danger px-2 py-1 fw-semibold small">거절</span>` : ""}
                    </p>
                    <div class="menus mb-4">
                      ${o.items
                        .map(
                          (i) => `
                        <div class="d-flex">
                          <p class="mb-1">${i.menuName}</p>
                          <p class="mb-1 ms-2">${i.quantity}개</p>
                        </div>
                      `,
                        )
                        .join("")}
                    </div>
                    <p class="mb-1 fw-bold">결제금액</p>
                  </div>

                  <div
                    class="d-flex flex-column align-items-end justify-content-between"
                  >
                    <div>
                      <button class="btn btn-danger rounded-pill px-3 py-1 me-2 ${o.orderStatus === "PENDING" ? "" : "d-none"}" 
                        type="button" 
                        id="cancelBtn"
                        data-order-id=${o.orderId}
                      >
                        <span class="fw-semibold" style="font-size: 0.8rem"
                          >주문취소</span
                        >
                      </button>
                      <button
                        class="btn btn-outline-dark rounded-pill px-3 py-1 link-btn"
                        type="button"
                        data-url="/pages/customer/order-detail.html?orderId=${o.orderId}"
                      >
                        <span class="fw-semibold" style="font-size: 0.8rem"
                          >주문상세</span
                        >
                      </button>
                    </div>
                    <p class="fw-bold me-2">${o.totalAmount.toLocaleString()}원</p>
                  </div>
                </div>
                <div class="text-center py-2 ${o.orderStatus === "PENDING" ? "" : "d-none"}">
                  <span
                    class="border border-secondary rounded px-5 py-2 fw-semibold"
                  >
                    주문 확인 중
                  </span>
                </div>
                <div class="text-center py-2 ${o.orderStatus === "COOKING" ? "" : "d-none"}">
                  <span
                    class="border border-success text-success rounded px-5 py-2 fw-semibold"
                  >
                    조리 중
                  </span>
                </div>
                <div class="text-center py-2 ${o.orderStatus === "DELIVERING" ? "" : "d-none"}">
                  <span
                    class="border border-primary text-primary rounded px-5 py-2 fw-semibold"
                  >
                    배달 중
                  </span>
                </div>
                <div class="text-center py-2 ${o.orderStatus === "DELIVERED" && o.hasReview === false ? "" : "d-none"}">
                  <button
                    class="btn btn-dark rounded px-5 py-2 fw-semibold link-btn"
                    data-url="/pages/customer/review.html?orderId=${o.orderId}"
                    type="button"
                  >
                    리뷰 쓰기
                  </button>
                </div>
              </div>
            </div>
          `;
          })
          .join("");

        $("#orderList").html(orderListHtml);
      }

      function loadOrders() {
        customerOrdersAPI()
          .done(function (response) {
            renderOrders(response.data);
          })
          .fail(function () {
            $("#orderList").html(
              "<p class='text-center'>주문 내역이 없습니다. 지금 주문해보세요!</p>",
            );
          });
      }

      $(document).ready(function () {
        updateCustomerAuthUI();
        loadOrders();
      });

      $(document).on("click", "#cancelBtn", function () {
        const orderId = $(this).data("orderId");
        cancelOrderAPI(orderId)
          .done(function () {
            alert("주문을 취소하였습니다.");
            loadOrders();
          })
          .fail(function () {
            alert("주문 취소를 실패하였습니다.");
          });
      });

      // .link-btn 클릭 시 지정한 data-url로 이동
      $(document).on("click", ".link-btn", function () {
        window.location.href = $(this).data("url");
      });
    </script>
