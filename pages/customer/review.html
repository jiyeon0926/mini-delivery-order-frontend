    <main>
      <div class="container py-5">
        <div class="text-center mb-5">
          <p class="fw-semibold">주문하신 메뉴는 어떠셨나요?</p>
          <div id="rating" class="fs-1 text-warning">

        <div class="mx-auto" style="max-width: 600px">
          <textarea

            rows="5"
            placeholder="솔직한 후기를 남겨주세요."
            maxlength="200"

          <p class="text-end text-muted small mt-1">

    <script

    <script src="/assets/js/common.js"></script>
    <script>
      let stars = 0;

      function paintStars(value) {
        $("#rating i").each(function () {
          const starValue = $(this).data("value");

          // value보다 작거나 같으면 별을 채움
          $(this)
            .toggleClass("bi-star-fill", starValue <= value)
            .toggleClass("bi-star", starValue > value);
        });
      }

      $(document).ready(function () {
        updateCustomerAuthUI();
      });

      // 마우스 올렸을 때 별점 표시 (임시)
      $("#rating i").on("mouseenter", function () {
        const hoverValue = $(this).data("value");
        paintStars(hoverValue);
      });

      // 별점 확정
      $("#rating i").on("click", function () {
        stars = $(this).data("value");
      });

      $("#content").on("input", function () {
        $("#charCount").text($(this).val().length);
      });

      $("#submitBtn").on("click", function () {
        if (stars === 0) {
          alert("별점을 선택해주세요.");

          return;
        }

        const content = $("#content").val();
        const data = {
          rating: stars,
          content: content === null ? " " : content,
        };

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get("orderId");
        createReviewAPI(orderId, data)
          .done(function () {
            alert("리뷰를 작성하였습니다.");
            window.location.href = "/pages/customer/order-list.html";
          })
          .fail(function () {
            alert("리뷰 작성을 실패하였습니다.");
          });
      });

      $("#cancelBtn").on("click", function () {
        window.location.href = "/pages/customer/order-list.html";
      });
    </script>
