  <head>

      rel="stylesheet"
    />
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/common.css" rel="stylesheet" />
  </head>
  <body class="bg-body-tertiary">
    <nav class="navbar navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/index.html">Eat Now</a>
        <div class="d-flex align-items-center gap-3 ms-auto">
          <a
            class="nav-link text-white cart-menu d-none"
            href="/pages/customer/cart.html"
            title="장바구니"
          >
            <i class="bi bi-cart fs-5"></i>
          </a>
          <a
            class="nav-link text-white login-menu"
            href="/pages/auth/login.html"
            title="로그인"
          >
            <i class="bi bi-box-arrow-in-right fs-5"></i>
          </a>
          <button
            class="nav-link btn btn-link text-white logout-menu d-none"
            id="logoutBtn"
            title="로그아웃"
          >
            <i class="bi bi-box-arrow-right fs-5"></i>
          </button>
          <!-- 햄버거 -->
          <button
            class="navbar-toggler d-none"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarMenu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
        <div class="collapse navbar-collapse mt-2" id="navbarMenu">
          <ul class="navbar-nav me-auto mb-2">
            <li class="nav-item">
              <a
                class="nav-link text-primary"
                href="/pages/customer/order-list.html"
                >주문내역</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link text-primary"
                href="/pages/customer/my-reviews.html"
                >리뷰내역</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/pages/user/nickname.html"
                >닉네임 변경</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/pages/user/password.html"
                >비밀번호 변경</a
              >
            </li>
            <li class="nav-item">
              <button
                class="nav-link btn btn-link text-start text-danger"
                id="deleteAccountBtn"
              >
                회원탈퇴
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main>
      <div class="container py-5">
        <!-- 가게 리뷰 목록 -->
        <h3 class="text-center mb-5 fw-bold">리뷰</h3>
        <div class="w-100 store-reviews" id="reviewList"></div>
      </div>
    </main>
    <footer class="pt-3 pb-4 text-body-secondary text-center text-small">
      <p class="mb-1">&copy; 2026 Eat Now</p>
    </footer>
    <script
      src="/assets/js/bootstrap.bundle.min.js"
      class="astro-vvvwv3sm"
    ></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/common.js"></script>
    <script>
      function renderReviews(data) {
        if (data.total === 0) {
          $("#reviewList").html(
            "<p class='text-center'>아직 작성된 리뷰가 없어요. 첫 리뷰를 남겨보세요!</p>",
          );

          return;
        }

        const reviewListHtml = data.reviews
          .map((r) => {
            if (r.deleted) {
              return `
                <div class="card mb-4">
                  <div class="card-body text-center text-muted">
                    <p class="mb-0">삭제된 리뷰입니다.</p>
                  </div>
                </div>
              `;
            }

            const stars = "★".repeat(r.rating);

            return `
                <div class="card mb-4 ps-2 pe-2">
                    <div class="card-body">
                        <div class="d-flex w-100 justify-content-between py-2">
                            <div class="d-flex flex-column">
                                <p class="mb-1 fw-bold">${r.nickname}</p>
                                <p class="small text-warning mb-3">${stars}</p>
                                <p class="mb-1 content">${r.content}</p>
                            </div>
                            <div class="text-end small fw-semibold text-nowrap">${formatDate(r.createdAt)}</div>
                        </div>
                    </div>
                </div>
            `;
          })
          .join("");

        $("#reviewList").html(reviewListHtml);
      }

      function loadReviews() {
        const params = new URLSearchParams(window.location.search);
        const storeId = params.get("storeId");

        storeReviewsAPI(storeId)
          .done(function (response) {
            renderReviews(response.data);
          })
          .fail(function () {
            $("#reviewList").html(
              "<p class='text-center'>아직 작성된 리뷰가 없어요. 첫 리뷰를 남겨보세요!</p>",
            );
          });
      }

      $(document).ready(function () {
        updateCustomerAuthUI();
        loadReviews();
      });
    </script>
  </body>
</html>
