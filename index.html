<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eat Now</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/assets/css/common.css" rel="stylesheet" />
  </head>
  <body class="bg-body-tertiary">
    <nav class="navbar navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="/index.html">Eat Now</a>
        <div class="d-flex align-items-center gap-3 ms-auto">
          <form role="search">
            <input
              class="form-control d-none"
              type="search"
              placeholder="먹고싶은 메뉴나 가게를 찾아보세요"
              aria-label="Search"
              id="search"
              style="width: 300px"
            />
          </form>
          <i class="bi bi-search text-white fs-5 searchBtn"></i>
          <a
            class="nav-link text-white cart-menu d-none"
            href="/pages/customer/cart.html"
            title="장바구니"
          >
            <i class="bi bi-cart fs-5"></i>
          </a>
          <a
            class="nav-link text-white login-menu"
            href="/pages/auth/login.html"
            title="로그인"
          >
            <i class="bi bi-box-arrow-in-right fs-5"></i>
          </a>
          <button
            class="nav-link btn btn-link text-white logout-menu d-none"
            id="logoutBtn"
            title="로그아웃"
          >
            <i class="bi bi-box-arrow-right fs-5"></i>
          </button>
          <!-- 햄버거 -->
          <button
            class="navbar-toggler d-none"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarMenu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
        <div class="collapse navbar-collapse mt-2" id="navbarMenu">
          <ul class="navbar-nav me-auto mb-2">
            <li class="nav-item">
              <a
                class="nav-link text-primary"
                href="/pages/customer/order-list.html"
                >주문내역</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link text-primary"
                href="/pages/customer/my-reviews.html"
                >리뷰내역</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/pages/user/nickname.html"
                >닉네임 변경</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/pages/user/password.html"
                >비밀번호 변경</a
              >
            </li>
            <li class="nav-item">
              <button
                class="nav-link btn btn-link text-start text-danger"
                id="deleteAccountBtn"
              >
                회원탈퇴
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main>
      <!-- 배너 -->
      <div
        id="adCarousel"
        class="carousel slide"
        data-bs-ride="carousel"
        data-bs-interval="2000"
      >
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="/assets/img/배너1.png"
              class="d-block w-100"
              alt="배너1"
              style="height: 320px"
            />
          </div>
          <div class="carousel-item">
            <img
              src="/assets/img/배너2.png"
              class="d-block w-100"
              alt="배너2"
              style="height: 320px"
            />
          </div>
        </div>
      </div>
      <div class="container py-5">
        <!-- 가게 목록 -->
        <div
          class="list-group mx-auto"
          id="storeList"
          style="max-width: 750px"
        ></div>
      </div>
    </main>
    <footer class="pt-3 pb-4 text-body-secondary text-center text-small">
      <p class="mb-1">&copy; 2026 Eat Now</p>
    </footer>
    <script
      src="/assets/js/bootstrap.bundle.min.js"
      class="astro-vvvwv3sm"
    ></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/common.js"></script>
    <script>
      function renderStores(data) {
        const storeListHtml = data
          .map((d) => {
            const statusText =
              d.storeStatus === "OPEN" ? "영업 중" : "영업 종료";
            const statusClass =
              d.storeStatus === "OPEN" ? "text-success" : "text-danger";

            return `
              <a
              href="/pages/customer/store-detail.html?storeId=${d.id}"
              class="list-group-item list-group-item-action d-flex gap-3 py-3"
              >
                <i class="bi bi-shop fs-5 ps-2"></i>
                <div class="d-flex w-100 justify-content-between">
                  <div class="d-flex flex-column">
                    <div class="small text-warning mb-1">
                      ★ ${d.averageRating} <span class="text-muted">(${d.reviewCount})</span>
                    </div>
                    <p class="mb-1 fw-bold">${d.name}</p>
                    <p class="mb-1 text-muted small">최소 주문 ${d.minOrderAmount.toLocaleString()}원</p>
                  </div>
                  <div class="text-end pe-2 small fw-semibold ${statusClass}">
                    ${statusText}
                  </div>
                </div>
              </a>
            `;
          })
          .join("");

        $("#storeList").html(storeListHtml);
      }

      // keyword 기본값 null
      function loadStores(keyword = null) {
        searchStoresAPI(keyword)
          .done(function (response) {
            renderStores(response.data);
          })
          .fail(function () {
            $("#storeList").html("<p class='text-center'>가게가 없습니다.</p>");
          });
      }

      $(document).ready(function () {
        updateCustomerAuthUI();
        loadStores();
      });

      $(".searchBtn").on("click", function () {
        const isHidden = $("#search").hasClass("d-none");
        if (isHidden) {
          $("#search").removeClass("d-none");
        } else if (!isHidden) {
          $("#search").addClass("d-none");
          loadStores();
        }
      });

      $("#search").on("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();

          const keyword = $(this).val().trim();
          loadStores(keyword);
        }
      });
    </script>
  </body>
</html>
